<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

 
    <div class="theme-toggle">

  <button id="themeBtn">🌙 Dark Mode</button>

</div> 
  <div class="container">

    <h1>Productivity Dashboard</h1>
    
    <div class="greeting-container">

  <h2 id="greeting"></h2>

  <p id="clock"></p>

<p id="date"></p>

</div>
<section class="quote-section">

  <h2>💡 Daily Motivation</h2>

  <div id="quoteBox">

    Loading quote...

  </div>

</section>

    <!-- TO DO SECTION -->
    <section class="todo-section">
      <h2>To-Do List</h2>
      <p class="edit-info">
  Double click a task to edit it
</p>

      <div class="todo-input">
        <input type="text" id="taskInput" placeholder="Enter a task">
        <button id="addTaskBtn">Add</button>
      </div>
     
      <div class="filters">

  <button id="allBtn">All</button>

  <button id="completedBtn">Completed</button>

  <button id="pendingBtn">Pending</button>

</div>

<div class="task-stats">

  <div class="stats-row">

    <p id="totalTasks">
      Total Tasks: 0
    </p>

    <p id="completedTasks">
      Completed: 0
    </p>

    <p id="pendingTasks">
      Pending: 0
    </p>

  </div>

  <div class="progress-container">

    <div id="progressBar"></div>

  </div>

</div>

<button id="clearAllBtn">
  🗑️ Clear All Tasks
</button>

      <ul id="taskList"></ul>
    </section>

    <!-- NOTES SECTION -->
    <section class="notes-section">
      <h2>Notes</h2>
      <textarea id="notesInput" placeholder="Write your notes here..."></textarea>
    </section>

    <!-- TIMER SECTION -->
    <section>

  <h2>Pomodoro Timer</h2>

  <div class="timer-container">

    <h1 id="timer">25:00</h1>

    <div class="timer-buttons">

      <button id="startBtn">Start</button>

      <button id="pauseBtn">Pause</button>

      <button id="resetBtn">Reset</button>

    </div>

  </div>

</section>

    <!-- WEATHER SECTION -->
    <section class="weather-section">
      <h2>Weather</h2>
      <div class="weather-container">

  <input type="text" id="cityInput" placeholder="Enter city">

  <button id="weatherBtn">Get Weather</button>

  <div id="weatherResult"></div>

</div>
    </section>

  </div>
<div id="toast"></div>

<div class="modal-overlay" id="modalOverlay">

  <div class="custom-modal">

    <h2 id="modalTitle">
      Confirm Action
    </h2>

    <p id="modalMessage">
      Are you sure?
    </p>

    <div class="modal-buttons">

      <button id="cancelModalBtn">
        Cancel
      </button>

      <button id="confirmModalBtn">
        Confirm
      </button>

    </div>

  </div>

</div>

<div class="modal-overlay" id="editModalOverlay">

  <div class="custom-modal">

    <h2>Edit Task</h2>

    <input
      type="text"
      id="editTaskInput"
      placeholder="Edit your task"
    />

    <div class="modal-buttons">

      <button id="cancelEditBtn">
        Cancel
      </button>

      <button id="saveEditBtn">
        Save
      </button>

    </div>

  </div>

</div>

  <script src="script.js"></script>
</body>
</html>
